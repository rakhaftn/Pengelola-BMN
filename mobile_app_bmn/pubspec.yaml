name: mobile_app_bmn
description: "Aplikasi Mobile Sistem Pengelolaan Barang Milik Negara (BMN)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP Client
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.4

  # QR Code Scanner
  mobile_scanner: ^6.0.2

  # Image Picker
  image_picker: ^1.1.2

  # UI Components
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7

  # Pull to Refresh
  pull_to_refresh: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/